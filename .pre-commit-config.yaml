---
default_stages: [pre-commit]

repos:
  - repo: https://github.com/typstyle-rs/pre-commit-typstyle
    rev: d7008a255d9482e7ff97af8283df0cc8ea1a11d0  # frozen: v0.14.4
    hooks:
      - id: typstyle

  - repo: https://github.com/crate-ci/typos
    rev: bbaefadf97b0ec5fdc942684b647f1a6ab250274  # frozen: v1.46.0
    hooks:
      - id: typos
        args: ["--force-exclude"]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: 996abf60411a8d954288ac9856aae7602b80cbda  # frozen: v0.22.1
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: b9874210e675dd3414937545a09a77ec3ba8f30f  # frozen: v0.10.6
    hooks:
      - id: tombi-format
      - id: tombi-lint

  - repo: https://github.com/adrienverge/yamllint
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # frozen: v1.38.0
    hooks:
      - id: yamllint
        args: ["--strict", "-c=.yamllint.yaml"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: fix-byte-order-marker
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]
      - id: pretty-format-json
        args: ["--autofix", "--no-sort-keys"]
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: check-xml
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-vcs-permalinks
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: no-commit-to-branch

  - repo: https://github.com/commitizen-tools/commitizen
    rev: efb1a7dc7a81934ff473100ae3a5a716f3022534  # frozen: v4.15.1
    hooks:
      - id: commitizen
      - id: commitizen-branch
        stages:
          - pre-push
