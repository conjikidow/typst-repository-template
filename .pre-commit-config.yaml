---
default_stages: [pre-commit]

repos:
  - repo: https://github.com/typstyle-rs/pre-commit-typstyle
    rev: d7008a255d9482e7ff97af8283df0cc8ea1a11d0  # frozen: v0.14.4
    hooks:
      - id: typstyle

  - repo: https://github.com/crate-ci/typos
    rev: bee27e3a4fd1ea2111cf90ab89cd076c870fce14  # frozen: v1.48.0
    hooks:
      - id: typos
        args: ["--force-exclude"]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: 534166213006ec869b773b7ed8c6ebeaad1165d0  # frozen: v0.23.0
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: 6e68b94732283b4455763359004c28a7cc94bdfd  # frozen: v1.1.7
    hooks:
      - id: tombi-format
      - id: tombi-lint

  - repo: https://github.com/adrienverge/yamllint
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # frozen: v1.38.0
    hooks:
      - id: yamllint
        args: ["--strict", "-c=.yamllint.yaml"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: fix-byte-order-marker
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]
      - id: pretty-format-json
        args: ["--autofix", "--no-sort-keys"]
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: check-xml
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-vcs-permalinks
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: no-commit-to-branch

  - repo: https://github.com/commitizen-tools/commitizen
    rev: 205e71c26d6dd6a802ca674c9ae4d12f1103a9bb  # frozen: v4.16.4
    hooks:
      - id: commitizen
      - id: commitizen-branch
        stages:
          - pre-push
